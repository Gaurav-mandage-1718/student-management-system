<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Management</title>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

<style>
    body {
        background-color: #eaf4ff;
    }

    .navbar {
        background: linear-gradient(135deg, #343a40, #000000);
    }

    .page-title {
        font-weight: bold;
        color: #343a40;
    }

    .card {
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .table thead {
        background: #007bff;
        color: white;
    }
    .text-center{
        background-color: #f4f6f9;
    }

    .btn-action {
        margin-right: 5px;
    }

    .btn-success {
        border-radius: 20px;
        padding: 6px 15px;
    }

    .table tbody tr:hover {
        background-color: #f1f1f1;
        transition: 0.2s;
    }
</style>

</head>

<body>

<nav class="navbar navbar-expand-md navbar-dark">
    <a class="navbar-brand font-weight-bold" th:href="@{/home}">
        🎓 Student Management System
    </a>

    <button class="navbar-toggler" type="button"
            data-toggle="collapse"
            data-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/getStudent}">
                    Student List
                </a>
            </li>
        </ul>
    </div>
</nav>


<div class="container mt-5">

    <div class="card">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="page-title">📋 Student List</h3>

                <a th:href="@{AddStudentPage/new}"
                   class="btn btn-success btn-sm">
                    ➕ Add Student
                </a>
            </div>

            <table class="table table-bordered table-hover">
                <thead class="text-center">
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody class="text-center">
                    <tr th:each="student : ${students}">
                        <td th:text="${student.first_Name}"></td>
                        <td th:text="${student.last_Name}"></td>
                        <td th:text="${student.email}"></td>

                        <td>
                            <a th:href="@{/student/edit/{id}(id=${student.id})}"
                               class="btn btn-primary btn-sm btn-action">
                                ✏ Edit
                            </a>

                            <a th:href="@{/student/delete/{id}(id=${student.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure?')">
                                🗑 Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

</body>
</html>
